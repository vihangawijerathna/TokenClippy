name: TokenClippy Production CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Pull your repository code into the GitHub Runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Authenticate securely with GCP via Workload Identity Federation
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/6416725908/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-deployer@tokenclippy.iam.gserviceaccount.com'

      # Step 3: Log in to Google Artifact Registry (GAR)
      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Step 4: Set up Docker Buildx for faster, advanced image caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Build & Push Backend to Google Artifact Registry
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: us-central1-docker.pkg.dev/tokenclippy/tokenclippy-apps/clippy-backend:${{ github.sha }}

      # Step 6: Build & Push Frontend Image (injecting the LIVE backend IP address)
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: us-central1-docker.pkg.dev/tokenclippy/tokenclippy-apps/clippy-frontend:${{ github.sha }}
          # 🔌 This injects the live cloud API link directly into the Vite compiler inside the container!
          build-args: |
            VITE_API_URL=http://34.121.20.73:5000

      # Step 7: Authenticate with Google Kubernetes Engine (GKE)
      - name: Authenticate with GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: tokenclippy-cluster
          location: us-central1

      # Step 8: Deploy your newly compiled Docker containers into the GKE Cluster
      - name: Deploy to Kubernetes Cluster
        run: |
          kubectl set image deployment/clippy-backend-deployment clippy-backend=us-central1-docker.pkg.dev/tokenclippy/tokenclippy-apps/clippy-backend:${{ github.sha }} --record
          kubectl set image deployment/clippy-frontend-deployment clippy-frontend=us-central1-docker.pkg.dev/tokenclippy/tokenclippy-apps/clippy-frontend:${{ github.sha }} --record